services:
  - type: web
    name: cryptoguard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api_app:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
